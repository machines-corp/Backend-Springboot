

services:
  mysql-db:
    image: mysql:8.0.36
    container_name: mysql-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-integrajobdb}
      MYSQL_USER: ${DB_USER:-jrgazmuri}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jrgazmuri}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: backend
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: integrajobdb
      DB_USER: jrgazmuri
      DB_PASSWORD: jrgazmuri
    ports:
      - "8080:8080"
    volumes:
      - ./scraper/out:/data/scraper_out


  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    image: integrajob-scraper:latest
    container_name: integrajob-scraper
    command: ["python","/app/src/scraper_inclusivo.py"]  
    env_file:
      - ./scraper/.env
    environment:
      - TZ=America/Santiago
    volumes:
      - ./scraper/out:/app/out
      - ./scraper/logs:/app/logs
      - ./scraper/tmp:/app/tmp
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/out/last_run.ok"]
      interval: 60s
      timeout: 5s
      retries: 2
    restart: "no"

volumes:
  mysql_data:
